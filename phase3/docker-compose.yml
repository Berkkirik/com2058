name: storecraft

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-storecraft}
      MYSQL_USER: ${MYSQL_USER:-storecraft}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-storecraft}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      - --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
      - --explicit_defaults_for_timestamp=ON
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-storecraft}:${MYSQL_PASSWORD:-storecraft}@mysql:3306/${MYSQL_DATABASE:-storecraft}?charset=utf8mb4
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-not-secret-change-me}
      APP_DEBUG: "1"
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./sql:/app/sql:ro
      - ./scripts:/app/scripts
      - ./tests:/app/tests

  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      UPLOAD_LIMIT: 256M
    ports:
      - "${PMA_HOST_PORT:-8080}:80"

volumes:
  mysql_data:
    name: storecraft_mysql_data
